      {q:"What happens in the patellar stretch reflex after the tendon is hit?", opts:["The same muscle receives a signal and contracts","The opposite muscle receives a signal and relaxes","The cortex blocks the tendon response","The Golgi tendon organ stops all movement"], ans:0, exp:"In the patellar reflex, sensory neurons send information to the spinal cord and an action potential returns through an alpha motor neuron to contract the same muscle."},

      {q:"What does the Golgi tendon organ detect?", opts:["Tension on the muscle","Length of the spindle","Sodium in the endplate","Timing of cortical plans"], ans:0, exp:"The Golgi tendon organ detects the total amount of muscle stretch or tension, meaning how hard the muscle is being pulled."},

      {q:"What is the effect of the polysynaptic inhibitory reflex when too much stretch is applied?", opts:["It inhibits the alpha neuron and decreases stretch","It excites the alpha neuron and increases stretch","It blocks the sensory neuron and removes posture","It activates the cortex and causes voluntary grasping"], ans:0, exp:"The inhibitory reflex reduces excessive stretch by inhibiting the alpha motor neuron."},
      {q:"What is the synapse between a neuron and a muscle called?", opts:["Neuromuscular junction","Motor association cortex","Golgi tendon organ","Transverse tubule"], ans:0, exp:"The synapse between a neuron and a muscle is called the neuromuscular junction."},
      {q:"What opens first at the presynaptic membrane of the motor neuron when an action potential arrives?", opts:["Calcium channels","Sodium receptors","Chloride pumps","Potassium vesicles"], ans:0, exp:"At the presynaptic motor neuron, the action potential opens calcium channels."},
      {q:"Which neurotransmitter is released at the neuromuscular junction in this chapter?", opts:["Acetylcholine","Glycine","Dopamine","GABA"], ans:0, exp:"Vesicles at the neuromuscular junction contain acetylcholine, which is excitatory here."},

      {q:"What are transverse tubules?", opts:["Cell membrane holes running perpendicular to muscle fibers","Thick filaments running parallel to actin filaments","Tendon sensors measuring whole-muscle tension","Cortical tracts controlling distal limb movement"], ans:0, exp:"Transverse tubules are made from cell membrane material and run perpendicular to muscle fibers like deep holes in the fiber."},

      {q:"What is the supplementary motor area especially important for?", opts:["Motor sequences and internally driven actions","Visual cues and externally driven reactions","Face and tongue movement execution","Posture reflexes from vestibular input"], ans:0, exp:"The SMA is important for motor sequences, well-learned sequences, and internally driven actions."},

      {q:"What did human TMS research suggest about the SMA and finger movements?", opts:["SMA helps plan the next movements in a sequence","SMA controls only immediate spinal reflexes","SMA mainly stores vestibular posture signals","SMA blocks arbitrary visual associations"], ans:0, exp:"Disrupting the SMA affected later finger movements, suggesting that it helps plan upcoming movements in a sequence."},

        "Movement of materials along microtubules",
        "Blood flow through cortical vessels",
        "Electrical firing across a synapse",
        "Diffusion of tumor cells into tissue"
      ],
      "ans": 0,
      "exp": "Axoplasmic transport uses microtubules to move materials through axons."
    },
    {
      "q": "What is constraint-induced movement therapy?",
      "opts": [
        "Restraining the good limb to train the impaired limb",
        "Using radiation to destroy a seizure focus",
        "Blocking sodium channels after a stroke",
        "Removing the damaged part of the brain"
      ],
      "ans": 0,
      "exp": "Constraint-induced movement therapy forces use of the impaired limb to promote recovery."
    }
  ]
}
];

const FUTURE = [
  {num:'01', name:'Introduction', desc:'Core concepts and foundations of physiological psychology.'},
  {num:'02', name:'Neurons and Synapses', desc:'Neural communication, action potentials, synapses, and neurotransmitters.'},
  {num:'03', name:'Neuroanatomy', desc:'Major nervous system structures and their functions.'},
  {num:'04', name:'Psychopharmacology', desc:'Drug effects, receptors, agonists, antagonists, and neural systems.'},
  {num:'05', name:'Vision', desc:'Visual pathways, receptors, perception, and cortical processing.'},
  {num:'06', name:'Other Senses', desc:'Audition, somatosensation, taste, smell, and vestibular systems.'},
  {num:'07', name:'Sleep', desc:'Sleep stages, EEG patterns, REM, slow-wave sleep, and memory.'}
];

let currentChapter = null;
let questionList = [];
let currentIndex = 0;
let score = 0;
let sessionFails = [];
let sessionState = [];
let lastMode = 'all';
let includeMastered = localStorage.getItem(STORAGE_PREFIX + 'include_mastered') === 'true';

function key(chId){ return STORAGE_PREFIX + chId; }
function getProgress(chId){
  const raw = localStorage.getItem(key(chId));
  if(!raw) return {best:0, attempts:0, fails:[], mastered:[], completed:[], current:null};
  try {
    const p = JSON.parse(raw);
    return {
      best:p.best||0,
      attempts:p.attempts||0,
      fails:p.fails||[],
      mastered:p.mastered||[],
      completed:p.completed||[],
      current:p.current||null
    };
  } catch(e){ return {best:0, attempts:0, fails:[], mastered:[], completed:[], current:null}; }
}
function saveProgress(chId, data){ localStorage.setItem(key(chId), JSON.stringify(data)); }
function getSavedSession(chId){
  const p = getProgress(chId);
  return p.current || null;
}
function saveCurrentSession(){
  if(!currentChapter || !questionList.length || !sessionState.length) return;
  const saved = getProgress(currentChapter.id);
  const current = {
    mode:lastMode || 'all',
    includeMastered,
    currentIndex,
    score,
    sessionFails,
    questionTexts: questionList.map(q => q.q),
    sessionState: sessionState.map(s => ({
      order:s.order.map(item => item.origIdx),
      answered:s.answered,
      selectedOrigIdx:s.selectedOrigIdx,
      correct:s.correct
    }))
  };
  const completedSet = new Set(saved.completed || []);
  questionList.forEach((q, i) => { if(sessionState[i] && sessionState[i].answered) completedSet.add(q.q); });
  saveProgress(currentChapter.id, {...saved, completed:[...completedSet], current});
}
function clearCurrentSession(chId){
  const saved = getProgress(chId);
  if(saved.current){
    delete saved.current;
    saveProgress(chId, saved);
  }
}
function restoreSession(ch, savedSession){
  const byText = new Map(ch.questions.map(q => [q.q, q]));
  const restoredQuestions = (savedSession.questionTexts || []).map(t => byText.get(t)).filter(Boolean);
  if(!restoredQuestions.length || restoredQuestions.length !== (savedSession.sessionState || []).length) return false;
  currentChapter = ch;
  lastMode = savedSession.mode || 'all';
  questionList = restoredQuestions;
  currentIndex = Math.min(savedSession.currentIndex || 0, questionList.length - 1);
  score = savedSession.score || 0;
  sessionFails = savedSession.sessionFails || [];
  sessionState = savedSession.sessionState.map((st, i) => {
    const q = questionList[i];
    const order = (st.order || []).map(origIdx => ({opt:q.opts[origIdx], origIdx})).filter(item => item.opt !== undefined);
    return {
      order: order.length === q.opts.length ? order : shuffle(q.opts.map((opt, origIdx) => ({opt, origIdx}))),
      answered:!!st.answered,
      selectedOrigIdx:st.selectedOrigIdx,
      correct:!!st.correct
    };
  });
  document.getElementById('quizTitle').textContent = `${currentChapter.num} · ${currentChapter.name}`;
  document.getElementById('modeText').textContent = lastMode === 'fails' ? 'Retake Fails · resumed' : (includeMastered ? 'All Questions · resumed' : 'Unmastered Questions · resumed');
  setIncludeMastered(includeMastered);
  show('quiz');
  renderQuestion();
  return true;
}
function setIncludeMastered(value){
  includeMastered = value;
  localStorage.setItem(STORAGE_PREFIX + 'include_mastered', String(value));
  ['homeIncludeMastered','quizIncludeMastered'].forEach(id => {
    const el = document.getElementById(id);
    if(el) el.checked = includeMastered;
  });
}
function shuffle(arr){
  const a = arr.slice();
  for(let i=a.length-1;i>0;i--){
    const j = Math.floor(Math.random()*(i+1));
    [a[i],a[j]]=[a[j],a[i]];
  }
  return a;
}
function renderHome(){
  setIncludeMastered(includeMastered);
  const grid = document.getElementById('chapterGrid');
  grid.innerHTML = '';
  CHAPTERS.forEach(ch => {
    const p = getProgress(ch.id);
    const inProgress = p.current ? (p.current.sessionState || []).filter(s => s.answered).length : 0;
    const completedProgress = (p.completed || []).filter(t => ch.questions.some(q => q.q === t)).length;
    const displayProgress = Math.max(p.best || 0, inProgress || 0, completedProgress || 0);
    const pct = ch.questions.length ? Math.round((displayProgress / ch.questions.length) * 100) : 0;
    const masteredCount = (p.mastered || []).length;
    const card = document.createElement('article');
    card.className = 'chapter-card';
    card.onclick = () => startChapter(ch.id, 'all');
    card.innerHTML = `<div class="num">${ch.num}</div><h2>${ch.name}</h2><p>${ch.desc}</p><div class="bar"><span style="width:${pct}%"></span></div><div class="meta"><span>Best: ${p.best}/${ch.questions.length}</span><span>${displayProgress}/${ch.questions.length} answered · ${masteredCount} mastered</span></div>${p.current ? `<div class="resume-note">In progress: ${inProgress}/${(p.current.questionTexts || []).length} answered — click to resume</div>` : ``}`;
    grid.appendChild(card);
  });
  FUTURE.forEach(ch => {
    const card = document.createElement('article');
    card.className = 'chapter-card future';
    card.innerHTML = `<div class="num">${ch.num}</div><h2>${ch.name}</h2><p>${ch.desc}</p><div class="bar"><span style="width:0%"></span></div><div class="meta"><span>Coming soon</span><span>0%</span></div>`;
    grid.appendChild(card);
  });
}
function show(view){
  ['home','quiz','results'].forEach(id => document.getElementById(id).classList.add('hidden'));
  document.getElementById(view).classList.remove('hidden');
}
function goHome(){ renderHome(); show('home'); }
function getQuestionPool(ch, mode){
  const saved = getProgress(ch.id);
  let pool;
  if(mode === 'fails'){
    const failQs = saved.fails.map(f => ch.questions.find(q => q.q === f.q)).filter(Boolean);
    pool = failQs.length ? failQs : ch.questions;
  } else {
    pool = ch.questions;
  }
  if(!includeMastered){
    const mastered = new Set(saved.mastered || []);
    const filtered = pool.filter(q => !mastered.has(q.q));
    pool = filtered.length ? filtered : pool;
  }
  return pool;
}
function startChapter(chId, mode, forceNew=false){
  currentChapter = CHAPTERS.find(c => c.id === chId);
  const savedSession = getSavedSession(chId);
  if(!forceNew && savedSession && (savedSession.mode || 'all') === mode){
    if(restoreSession(currentChapter, savedSession)) return;
  }
  if(forceNew) clearCurrentSession(chId);
  lastMode = mode;
  questionList = getQuestionPool(currentChapter, mode).slice();
  currentIndex = 0;
  score = 0;
  sessionFails = [];
  sessionState = questionList.map(q => ({
    order: shuffle(q.opts.map((opt, origIdx) => ({opt, origIdx}))),
    answered:false,
    selectedOrigIdx:null,
    correct:false
  }));
  document.getElementById('quizTitle').textContent = `${currentChapter.num} · ${currentChapter.name}`;
  document.getElementById('modeText').textContent = mode === 'fails' ? 'Retake Fails' : (includeMastered ? 'All Questions' : 'Unmastered Questions');
  setIncludeMastered(includeMastered);
  show('quiz');
  renderQuestion();
  saveCurrentSession();
}
function restartCurrentQuiz(){
  if(currentChapter) startChapter(currentChapter.id, lastMode || 'all', true);
}
function isMastered(q){
  if(!currentChapter) return false;
  return (getProgress(currentChapter.id).mastered || []).includes(q.q);
}
function toggleMasteredCurrent(checked){
  const q = questionList[currentIndex];
  const saved = getProgress(currentChapter.id);
  const set = new Set(saved.mastered || []);
  if(checked) set.add(q.q); else set.delete(q.q);
  saveProgress(currentChapter.id, {...saved, mastered:[...set]});
  saveCurrentSession();
  renderQuestionNav();
}
function renderQuestion(){
  const q = questionList[currentIndex];
  const state = sessionState[currentIndex];
  document.getElementById('progressText').textContent = `Question ${currentIndex + 1} / ${questionList.length}`;
  document.getElementById('quizBar').style.width = `${(answeredCount() / questionList.length) * 100}%`;
  document.getElementById('questionText').textContent = q.q;
  document.getElementById('feedback').classList.toggle('hidden', !state.answered);
  document.getElementById('masteredCheck').checked = isMastered(q);
  document.getElementById('nextBtn').textContent = currentIndex === questionList.length - 1 ? 'Finish →' : 'Next →';
  document.getElementById('finishBtn').disabled = answeredCount() < questionList.length;
  const answers = document.getElementById('answers');
  answers.innerHTML = '';
  state.order.forEach((item, dispIdx) => {
    const b = document.createElement('button');
    b.className = 'answer';
    b.textContent = item.opt;
    b.onclick = () => selectAnswer(item.origIdx, dispIdx, state.order);
    if(state.answered){
      b.disabled = true;
      if(item.origIdx === q.ans) b.classList.add('correct');
      if(item.origIdx === state.selectedOrigIdx && item.origIdx !== q.ans) b.classList.add('wrong');
    }
    answers.appendChild(b);
  });
  const fb = document.getElementById('feedback');
  if(state.answered){
    fb.innerHTML = state.correct ? `<strong>Correct.</strong> ${q.exp}` : `<strong>Not quite.</strong> Correct answer: <strong>${q.opts[q.ans]}</strong><br>${q.exp}`;
  }
  renderQuestionNav();
}
function answeredCount(){ return sessionState.filter(s => s.answered).length; }
function selectAnswer(origIdx, dispIdx, indexed){
  const state = sessionState[currentIndex];
  if(state.answered) return;
  const q = questionList[currentIndex];
  state.answered = true;
  state.selectedOrigIdx = origIdx;
  state.correct = origIdx === q.ans;
  if(state.correct){
    score++;
  } else {
    sessionFails.push({q:q.q, yourAns:q.opts[origIdx], correct:q.opts[q.ans], exp:q.exp});
  }
  saveCurrentSession();
  renderQuestion();
}
function prevQuestion(){
  if(currentIndex > 0){ currentIndex--; saveCurrentSession(); renderQuestion(); }
}
function nextQuestion(){
  if(currentIndex >= questionList.length - 1){
    if(answeredCount() === questionList.length) finishQuiz();
    return;
  }
  currentIndex++;
  saveCurrentSession();
  renderQuestion();
}
function jumpToQuestion(i){
  currentIndex = i;
  saveCurrentSession();
  renderQuestion();
}
function renderQuestionNav(){
  const nav = document.getElementById('questionNav');
  nav.innerHTML = '';
  const mastered = new Set(getProgress(currentChapter.id).mastered || []);
  questionList.forEach((q, i) => {
    const s = sessionState[i];
    const b = document.createElement('button');
    b.className = 'navbtn';
    if(i === currentIndex) b.classList.add('current');
    if(s.answered) b.classList.add(s.correct ? 'done' : 'missed');
    if(mastered.has(q.q)) b.classList.add('mastered');
    b.textContent = i + 1;
    b.title = mastered.has(q.q) ? 'Mastered question' : 'Jump to question';
    b.onclick = () => jumpToQuestion(i);
    nav.appendChild(b);
  });
}
function finishQuiz(){
  const saved = getProgress(currentChapter.id);
  const best = Math.max(saved.best || 0, score);
  const merged = [...sessionFails];
  const seen = new Set(merged.map(f => f.q));
  (saved.fails || []).forEach(f => { if(!seen.has(f.q)) merged.push(f); });
  const stillFailedTexts = new Set(sessionFails.map(f => f.q));
  const updatedFails = merged.filter(f => stillFailedTexts.has(f.q) || !questionList.some(q => q.q === f.q));
  const completedSet = new Set(saved.completed || []);
  questionList.forEach((q, i) => { if(sessionState[i] && sessionState[i].answered) completedSet.add(q.q); });
  saveProgress(currentChapter.id, {best, attempts:(saved.attempts || 0)+1, fails:updatedFails, mastered:saved.mastered || [], completed:[...completedSet], current:null});
  document.getElementById('resultTitle').textContent = `${currentChapter.num} · ${currentChapter.name}`;
  document.getElementById('scoreText').textContent = `${score}/${questionList.length}`;
  document.getElementById('scoreDetail').textContent = `Score: ${Math.round((score/questionList.length)*100)}%. Saved best for full chapter: ${best}/${currentChapter.questions.length}. Mastered questions: ${(saved.mastered || []).length}.`;
  document.getElementById('retakeFailsBtn').disabled = updatedFails.length === 0;
  const failList = document.getElementById('failList');
  failList.innerHTML = '';
  if(sessionFails.length){
    sessionFails.forEach(f => {
      const div = document.createElement('div');
      div.className = 'fail';
      div.innerHTML = `<strong>${f.q}</strong><p>Your answer: ${f.yourAns}</p><p>Correct answer: ${f.correct}</p><p>${f.exp}</p>`;
      failList.appendChild(div);
    });
  } else {
    failList.innerHTML = `<div class="fail"><strong>No failed questions this round.</strong><p>Nice. You can still retake the quiz for reinforcement.</p></div>`;
  }
  show('results');
}
function clearChapterProgress(chId){
  localStorage.removeItem(key(chId));
  goHome();
}
setIncludeMastered(includeMastered);
renderHome();

</script>
